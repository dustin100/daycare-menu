<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --surface: #FFFFFF;
    --border: #F0E6D8;
    --text: #3D2C1E;
    --text-muted: #9A8777;
    --morning: #F9A825;
    --morning-bg: #FFF8E1;
    --lunch: #43A047;
    --lunch-bg: #E8F5E9;
    --snack: #5C6BC0;
    --snack-bg: #E8EAF6;
    --late-snack: #E91E63;
    --late-snack-bg: #FCE4EC;
    --accent: #FF6F00;
    --today: #FFF3E0;
    --today-border: #FF9800;
    --menu1: #43A047;
    --menu2: #C62828;
    --menu3: #1565C0;
    --menu4: #7B1FA2;
    --shadow-sm: 0 1px 3px rgba(61,44,30,0.06);
    --shadow-md: 0 4px 12px rgba(61,44,30,0.08);
    --shadow-lg: 0 8px 30px rgba(61,44,30,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { font-size: 1.6rem; }

  /* Navigation */
  .nav-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn {
    background: none;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .nav-arrow {
    background: none;
    border: 2px solid var(--border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.2s;
    color: var(--text);
  }
  .nav-arrow:hover { border-color: var(--accent); color: var(--accent); }
  .current-label {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.15rem;
    min-width: 200px;
    text-align: center;
  }
  .today-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 6px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .today-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* Menu badge */
  .menu-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .menu-badge.m1 { background: var(--menu1); }
  .menu-badge.m2 { background: var(--menu2); }
  .menu-badge.m3 { background: var(--menu3); }
  .menu-badge.m4 { background: var(--menu4); }

  /* Main content */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px 40px;
  }

  /* MONTH VIEW */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .month-grid .day-header {
    text-align: center;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--text-muted);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .month-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 8px;
    min-height: 110px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .month-cell:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .month-cell.today { border: 2px solid var(--today-border); background: var(--today); }
  .month-cell.outside { opacity: 0.35; }
  .month-cell .date-num {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .month-cell .meal-preview {
    font-size: 0.65rem;
    line-height: 1.4;
    color: var(--text-muted);
  }
  .month-cell .meal-preview .meal-line {
    display: flex;
    align-items: baseline;
    gap: 3px;
    margin-bottom: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .meal-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }
  .meal-dot.morning { background: var(--morning); }
  .meal-dot.lunch { background: var(--lunch); }
  .meal-dot.snack { background: var(--snack); }
  .meal-dot.late-snack { background: var(--late-snack); }
  .month-cell.weekend { background: #f9f6f2; }

  /* WEEK VIEW */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .week-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s;
    cursor: pointer;
  }
  .week-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .week-card.today { border: 2px solid var(--today-border); }
  .week-card-header {
    padding: 12px 14px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .week-card-header .day-name { font-size: 0.95rem; }
  .week-card-header .day-date { font-size: 0.8rem; color: var(--text-muted); }
  .week-card-body { padding: 10px 14px 14px; }
  .meal-section {
    padding: 8px 0;
    border-bottom: 1px solid #f5f0ea;
  }
  .meal-section:last-child { border-bottom: none; }
  .meal-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .meal-label.morning { color: var(--morning); }
  .meal-label.lunch { color: var(--lunch); }
  .meal-label.snack { color: var(--snack); }
  .meal-label.late-snack { color: var(--late-snack); }
  .meal-text {
    font-size: 0.8rem;
    line-height: 1.45;
    color: var(--text);
  }

  /* DAY VIEW */
  .day-view {
    max-width: 700px;
    margin: 0 auto;
  }
  .day-view-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .day-view-header h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .day-view-header .sub { color: var(--text-muted); font-size: 0.95rem; }
  .day-meal-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
    border-left: 4px solid;
    transition: all 0.2s;
  }
  .day-meal-card:hover { box-shadow: var(--shadow-md); }
  .day-meal-card.morning-card { border-color: var(--morning); background: var(--morning-bg); }
  .day-meal-card.lunch-card { border-color: var(--lunch); background: var(--lunch-bg); }
  .day-meal-card.snack-card { border-color: var(--snack); background: var(--snack-bg); }
  .day-meal-card.late-snack-card { border-color: var(--late-snack); background: var(--late-snack-bg); }
  .day-meal-card h3 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .day-meal-card.morning-card h3 { color: var(--morning); }
  .day-meal-card.lunch-card h3 { color: var(--lunch); }
  .day-meal-card.snack-card h3 { color: var(--snack); }
  .day-meal-card.late-snack-card h3 { color: var(--late-snack); }
  .day-meal-card p {
    font-size: 1rem;
    line-height: 1.6;
  }
  .no-meals {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .week-grid { grid-template-columns: 1fr; gap: 10px; }
    .month-cell { min-height: 80px; padding: 4px 5px; }
    .month-cell .meal-preview { display: none; }
    .header-inner { justify-content: center; }
    .current-label { min-width: auto; }
  }
  @media (max-width: 600px) {
    .month-grid { gap: 2px; }
    .month-cell { min-height: 55px; }
    .month-cell .date-num { font-size: 0.8rem; }
    .main { padding: 12px; }
  }

  /* Fade in */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

const DAY_NAMES = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ─── REFERENCE: Week of March 9, 2026 = Menu 1 ───
const REF_DATE = new Date(2026, 2, 9); // March 9, 2026
const REF_MENU = 1;

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  d.setHours(0,0,0,0);
  return d;
}

function weeksBetween(d1, d2) {
  const start1 = getWeekStart(d1).getTime();
  const start2 = getWeekStart(d2).getTime();
  return Math.round((start2 - start1) / (7 * 24 * 60 * 60 * 1000));
}

function getMenuForDate(date) {
  const diff = weeksBetween(REF_DATE, date);
  let menuNum = ((diff % 4) + 4) % 4; // 0, 1, 2, 3
  // REF is menu 1 (index 0)
  return menuNum + 1; // 1, 2, 3, 4
}

function getMealsForDate(date) {
  const dayOfWeek = date.getDay();
  if (dayOfWeek === 0 || dayOfWeek === 6) return null; // weekend
  const dayName = DAY_NAMES[dayOfWeek];
  const menuNum = getMenuForDate(date);
  return { meals: MENUS[menuNum][dayName], menuNum };
}

function isToday(date) {
  const t = new Date();
  return date.getFullYear() === t.getFullYear() && date.getMonth() === t.getMonth() && date.getDate() === t.getDate();
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

// ─── STATE ───
let currentView = 'month';
let currentDate = new Date();

// ─── RENDER ───
const content = document.getElementById('calendarContent');
const label = document.getElementById('currentLabel');

function render() {
  content.innerHTML = '';
  if (currentView === 'month') renderMonth();
  else if (currentView === 'week') renderWeek();
  else renderDay();
  content.classList.remove('fade-in');
  void content.offsetWidth;
  content.classList.add('fade-in');
}

function renderMonth() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  label.textContent = `${MONTH_NAMES[month]} ${year}`;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDay = firstDay.getDay();

  let html = '<div class="month-grid">';
  DAY_LABELS.forEach(d => html += `<div class="day-header">${d}</div>`);

  // Fill preceding days
  const prevMonth = new Date(year, month, 0);
  for (let i = startDay - 1; i >= 0; i--) {
    const d = new Date(year, month - 1, prevMonth.getDate() - i);
    html += buildMonthCell(d, true);
  }
  // Current month days
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const d = new Date(year, month, day);
    html += buildMonthCell(d, false);
  }
  // Fill remaining
  const totalCells = startDay + lastDay.getDate();
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(year, month + 1, i);
    html += buildMonthCell(d, true);
  }
  html += '</div>';

  // Legend
  html += `<div class="legend">
    <div class="legend-item"><span class="meal-dot morning"></span> Morning</div>
    <div class="legend-item"><span class="meal-dot lunch"></span> Lunch</div>
    <div class="legend-item"><span class="meal-dot snack"></span> Snack</div>
    <div class="legend-item"><span class="meal-dot late-snack"></span> Late Snack</div>
    <div class="legend-item"><span class="menu-badge m1">Menu 1</span></div>
    <div class="legend-item"><span class="menu-badge m2">Menu 2</span></div>
    <div class="legend-item"><span class="menu-badge m3">Menu 3</span></div>
    <div class="legend-item"><span class="menu-badge m4">Menu 4</span></div>
  </div>`;

  content.innerHTML = html;

  content.querySelectorAll('.month-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      currentDate = new Date(cell.dataset.date);
      currentView = 'day';
      setActiveViewBtn('day');
      render();
    });
  });
}

function buildMonthCell(date, outside) {
  const dow = date.getDay();
  const weekend = dow === 0 || dow === 6;
  const today = isToday(date);
  const data = getMealsForDate(date);
  const cls = ['month-cell'];
  if (outside) cls.push('outside');
  if (today) cls.push('today');
  if (weekend) cls.push('weekend');

  let inner = `<div class="date-num">${date.getDate()}`;
  if (data && !outside) inner += ` <span class="menu-badge m${data.menuNum}">M${data.menuNum}</span>`;
  inner += '</div>';

  if (data && data.meals && !outside) {
    const m = data.meals;
    inner += `<div class="meal-preview">
      <div class="meal-line"><span class="meal-dot morning"></span> ${truncate(m.morning, 22)}</div>
      <div class="meal-line"><span class="meal-dot lunch"></span> ${truncate(mainDish(m.lunch), 22)}</div>
      <div class="meal-line"><span class="meal-dot snack"></span> ${truncate(m.snack, 22)}</div>
      <div class="meal-line"><span class="meal-dot late-snack"></span> ${truncate(m.lateSnack, 22)}</div>
    </div>`;
  }

  return `<div class="${cls.join(' ')}" data-date="${date.toISOString()}">${inner}</div>`;
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len) + '…' : str;
}

function mainDish(lunch) {
  if (!lunch) return '';
  return lunch.split(',')[0];
}

function renderWeek() {
  const ws = getWeekStart(currentDate);
  const mon = new Date(ws);
  mon.setDate(mon.getDate() + 1);
  const fri = new Date(mon);
  fri.setDate(fri.getDate() + 4);

  const menuNum = getMenuForDate(mon);
  label.textContent = `${formatShort(mon)} – ${formatShort(fri)}`;

  let html = `<div style="text-align:center;margin-bottom:16px;">
    <span class="menu-badge m${menuNum}" style="font-size:0.8rem;padding:5px 14px;">Menu ${menuNum}</span>
  </div>`;
  html += '<div class="week-grid">';

  for (let i = 0; i < 5; i++) {
    const d = new Date(mon);
    d.setDate(d.getDate() + i);
    const data = getMealsForDate(d);
    const today = isToday(d);
    const meals = data ? data.meals : null;

    html += `<div class="week-card${today ? ' today' : ''}" data-date="${d.toISOString()}">
      <div class="week-card-header">
        <span class="day-name">${DAY_LABELS[d.getDay()]}</span>
        <span class="day-date">${d.getDate()}</span>
      </div>
      <div class="week-card-body">`;
    if (meals) {
      html += mealSectionHtml('Morning', 'morning', meals.morning);
      html += mealSectionHtml('Lunch', 'lunch', meals.lunch);
      html += mealSectionHtml('Snack', 'snack', meals.snack);
      html += mealSectionHtml('Late Snack', 'late-snack', meals.lateSnack);
    }
    html += '</div></div>';
  }
  html += '</div>';
  content.innerHTML = html;

  content.querySelectorAll('.week-card[data-date]').forEach(card => {
    card.addEventListener('click', () => {
      currentDate = new Date(card.dataset.date);
      currentView = 'day';
      setActiveViewBtn('day');
      render();
    });
  });
}

function mealSectionHtml(labelText, cls, text) {
  return `<div class="meal-section">
    <div class="meal-label ${cls}">● ${labelText}</div>
    <div class="meal-text">${text || '—'}</div>
  </div>`;
}

function renderDay() {
  const data = getMealsForDate(currentDate);
  const dayLabel = currentDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  let html = '<div class="day-view">';
  html += `<div class="day-view-header">
    <h2>${dayLabel}</h2>`;
  if (data) html += `<div class="sub"><span class="menu-badge m${data.menuNum}" style="font-size:0.75rem;padding:4px 12px;">Menu ${data.menuNum}</span></div>`;
  else html += `<div class="sub">Weekend — No meals scheduled</div>`;
  html += '</div>';

  label.textContent = dayLabel;

  if (data && data.meals) {
    const m = data.meals;
    html += dayCard('Morning', 'morning-card', '🌅', m.morning);
    html += dayCard('Lunch', 'lunch-card', '🥗', m.lunch);
    html += dayCard('Snack', 'snack-card', '🍎', m.snack);
    html += dayCard('Late Snack', 'late-snack-card', '🧁', m.lateSnack);
    html += `<p style="text-align:center;color:var(--text-muted);font-size:0.8rem;margin-top:16px;">All meals served with Milk/Water. All vegetables steamed soft.</p>`;
  } else {
    html += '<div class="no-meals">No meals on weekends</div>';
  }
  html += '</div>';
  content.innerHTML = html;
}

function dayCard(title, cls, emoji, text) {
  return `<div class="day-meal-card ${cls}">
    <h3>${emoji} ${title}</h3>
    <p>${text || '—'}</p>
  </div>`;
}

function formatShort(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ─── NAVIGATION ───
document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentView = btn.dataset.view;
    setActiveViewBtn(currentView);
    render();
  });
});

function setActiveViewBtn(view) {
  document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
}

document.getElementById('prev').addEventListener('click', () => {
  if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
  else if (currentView === 'week') currentDate.setDate(currentDate.getDate() - 7);
  else currentDate.setDate(currentDate.getDate() - 1);
  render();
});

document.getElementById('next').addEventListener('click', () => {
  if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
  else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + 7);
  else currentDate.setDate(currentDate.getDate() + 1);
  render();
});

document.getElementById('todayBtn').addEventListener('click', () => {
  currentDate = new Date();
  render();
});

// Initial render
render();
</script>
</body>
</html>
