<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🍽️</span>
        Meal Calendar
      </div>

      <nav class="nav-controls">
        <button class="nav-btn active" data-view="month">Month</button>
        <button class="nav-btn" data-view="week">Week</button>
        <button class="nav-btn" data-view="day">Day</button>
      </nav>

      <div class="nav-controls">
        <button class="nav-arrow" id="prev" aria-label="Previous">◀</button>
        <span class="current-label" id="currentLabel"></span>
        <button class="nav-arrow" id="next" aria-label="Next">▶</button>
        <button class="today-btn" id="todayBtn">Today</button>
      </div>
    </div>
  </header>

  <main class="main" id="calendarContent"></main>

  <script src="app.js"></script>
</body>
</html>
